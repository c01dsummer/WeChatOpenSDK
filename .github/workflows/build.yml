name: Build XCFramework

on:
  workflow_dispatch:
    inputs:
      sdk_url:
        description: 'WeChatSDK download URL (leave empty to use default: https://dldir1.qq.com/WechatWebDev/opensdk/OpenSDK2.0.5.zip)'
        required: false
      sdk_checksum:
        description: 'Expected SHA-256 checksum of the SDK zip (leave empty to use default)'
        required: false
      version:
        description: 'Version tag for the release (e.g. 2.0.5)'
        required: true

permissions:
  contents: write

env:
  DEFAULT_VERSION: "2.0.5"
  DEFAULT_SDK_URL: "https://dldir1.qq.com/WechatWebDev/opensdk/OpenSDK2.0.5.zip"
  DEFAULT_SDK_CHECKSUM: "370884caf65b4220fb739c162200b95e991fb3b1a8b32c4c601c31bcaf9029c2"

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          VERSION="${{ inputs.version }}"
          SDK_URL="${{ inputs.sdk_url }}"
          SDK_CHECKSUM="${{ inputs.sdk_checksum }}"

          # If version differs from default, both sdk_url and sdk_checksum must be provided
          if [ "$VERSION" != "$DEFAULT_VERSION" ] && { [ -z "$SDK_URL" ] || [ -z "$SDK_CHECKSUM" ]; }; then
            echo "Error: version '$VERSION' differs from default ($DEFAULT_VERSION), you must provide both sdk_url and sdk_checksum"
            exit 1
          fi

          # If either sdk_url or sdk_checksum is provided, both must be provided
          if { [ -n "$SDK_URL" ] && [ -z "$SDK_CHECKSUM" ]; } || { [ -z "$SDK_URL" ] && [ -n "$SDK_CHECKSUM" ]; }; then
            echo "Error: sdk_url and sdk_checksum must be provided together"
            exit 1
          fi

      - name: Download WeChatSDK
        run: |
          SDK_URL="${{ inputs.sdk_url }}"
          SDK_CHECKSUM="${{ inputs.sdk_checksum }}"

          if [ -z "$SDK_URL" ]; then
            SDK_URL="$DEFAULT_SDK_URL"
          fi
          if [ -z "$SDK_CHECKSUM" ]; then
            SDK_CHECKSUM="$DEFAULT_SDK_CHECKSUM"
          fi

          # Restrict SDK_URL to trusted HTTPS host
          if ! echo "$SDK_URL" | grep -E '^https://dldir1\.qq\.com/.*\.zip$' > /dev/null; then
            echo "Error: sdk_url must be an HTTPS URL on dldir1.qq.com ending with .zip"
            exit 1
          fi

          echo "Downloading SDK from: $SDK_URL"
          curl -L --fail --retry 3 -o WeChatSDK.zip "$SDK_URL"

          # Verify checksum
          ACTUAL_CHECKSUM=$(shasum -a 256 WeChatSDK.zip | awk '{print $1}')
          if [ "$ACTUAL_CHECKSUM" != "$SDK_CHECKSUM" ]; then
            echo "Error: checksum mismatch"
            echo "  expected: $SDK_CHECKSUM"
            echo "  actual:   $ACTUAL_CHECKSUM"
            exit 1
          fi

          # Validate ZIP entries for path traversal
          if unzip -Z1 WeChatSDK.zip | grep -E '(^/|(^|/)\.\.(\/|$))' > /dev/null; then
            echo "Error: ZIP archive contains unsafe paths"
            exit 1
          fi

          unzip -o WeChatSDK.zip -d WeChatSDK_tmp
          echo "Downloaded contents:"
          find WeChatSDK_tmp -type f
          mkdir -p Library
          find WeChatSDK_tmp \( -name "*.a" -o -name "*.h" \) -type f -print0 | while IFS= read -r -d '' f; do
            cp "$f" Library/
          done

          # Verify required files exist
          for required in libWeChatSDK.a WXApi.h WXApiObject.h WechatAuthSDK.h; do
            if [ ! -f "Library/$required" ]; then
              echo "Error: required file $required not found in SDK"
              exit 1
            fi
          done

          echo "Library contents:"
          ls -la Library/
          rm -rf WeChatSDK.zip WeChatSDK_tmp

      - name: Build XCFramework
        run: bash -euo pipefail create-xcframework.sh

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ inputs.version }}"
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "Release $VERSION already exists, uploading asset with overwrite"
            gh release upload "$VERSION" WeChatOpenSDK.xcframework.zip --clobber
          else
            gh release create "$VERSION" \
              --title "WeChatOpenSDK $VERSION" \
              --notes "Built from WeChat SDK $VERSION" \
              --target ${{ github.ref_name }} \
              WeChatOpenSDK.xcframework.zip
          fi

      - name: Update Package.swift and commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ inputs.version }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/WeChatOpenSDK.xcframework.zip"

          # Download release asset and compute checksum from it
          gh release download "$VERSION" \
            --pattern "WeChatOpenSDK.xcframework.zip" \
            --dir . \
            --clobber
          CHECKSUM=$(swift package compute-checksum WeChatOpenSDK.xcframework.zip)
          rm -f WeChatOpenSDK.xcframework.zip

          echo "Release URL: $RELEASE_URL"
          echo "Computed checksum: $CHECKSUM"

          # Update Package.swift using CI marker comments to target exact lines
          sed -i '' '/\/\/ \[CI:URL\]/{n;s|url: ".*"|url: "'"$RELEASE_URL"'"|;}' Package.swift
          sed -i '' '/\/\/ \[CI:CHECKSUM\]/{n;s|checksum: "[0-9a-f]\{64\}"|checksum: "'"$CHECKSUM"'"|;}' Package.swift

          echo "Updated Package.swift:"
          cat Package.swift

          if git diff --quiet Package.swift; then
            echo "No change needed"
          else
            BRANCH="ci/update-package-swift-${VERSION}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b "$BRANCH"
            git add Package.swift
            git commit -m "Update Package.swift for $VERSION release"
            git push origin "$BRANCH"
            gh pr create \
              --title "Update Package.swift for $VERSION release" \
              --body "Auto-generated by CI. Updates the binaryTarget URL and checksum for version $VERSION." \
              --base "${{ github.ref_name }}" \
              --head "$BRANCH"
          fi

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeChatOpenSDK.xcframework
          path: build/WeChatOpenSDK.xcframework
