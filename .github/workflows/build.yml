name: Build XCFramework

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:
    inputs:
      sdk_url:
        description: 'WeChatSDK download URL (leave empty to use CocoaPods source)'
        required: false

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download WeChatSDK
        run: |
          SDK_URL="${{ inputs.sdk_url }}"
          if [ -n "$SDK_URL" ]; then
            echo "Downloading SDK from: $SDK_URL"
            curl -L --fail --retry 3 -o WeChatSDK.zip "$SDK_URL"
          else
            echo "Downloading SDK via CocoaPods spec..."
            brew install cocoapods 2>/dev/null || true
            pod spec cat WechatOpenSDK > /tmp/podspec.json
            SDK_URL=$(ruby -rjson -e 'puts JSON.parse(File.read("/tmp/podspec.json"))["source"]["http"]')
            echo "Resolved SDK URL: $SDK_URL"
            curl -L --fail --retry 3 -o WeChatSDK.zip "$SDK_URL"
          fi
          unzip -o WeChatSDK.zip -d WeChatSDK_tmp
          echo "Downloaded contents:"
          find WeChatSDK_tmp -type f
          mkdir -p Library
          find WeChatSDK_tmp \( -name "*.a" -o -name "*.h" \) -type f | while read f; do
            cp "$f" Library/
          done
          echo "Library contents:"
          ls -la Library/
          rm -rf WeChatSDK.zip WeChatSDK_tmp

      - name: Build XCFramework
        run: bash create-xcframework.sh

      - name: Upload XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: WeChatOpenSDK.xcframework
          path: build/WeChatOpenSDK.xcframework

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: WeChatOpenSDK.xcframework.zip
          path: WeChatOpenSDK.xcframework.zip
